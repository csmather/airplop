<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>airplop</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>airplop</h1>
  <div class="meta">
    <span class="status" id="status"><span class="dot"></span>connecting</span>
    <span class="ip">{{.LanIP}}:8765</span>
  </div>

  <textarea id="send" placeholder="paste here, then send" autofocus></textarea>

  <button id="sendBtn" disabled aria-label="send">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M8 3V13M3.5 8.5 8 13l4.5-4.5"/>
    </svg>
  </button>

  <pre id="received"></pre>

  <script>
    const sendEl = document.getElementById('send');
    const sendBtn = document.getElementById('sendBtn');
    const statusEl = document.getElementById('status');
    const receivedEl = document.getElementById('received');

    const syncBtn = () => { sendBtn.disabled = !sendEl.value.trim(); };
    sendEl.addEventListener('input', syncBtn);
    syncBtn();

    sendBtn.onclick = async () => {
      const text = sendEl.value;
      if (!text.trim()) return;
      sendBtn.disabled = true;
      try {
        await fetch('/update', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ text }),
        });
      } finally {
        syncBtn();
      }
    };

    sendEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) sendBtn.click();
    });

    receivedEl.addEventListener('click', async () => {
      const text = receivedEl.textContent;
      if (!text) return;
      try {
        await navigator.clipboard.writeText(text);
        receivedEl.classList.remove('copied');
        void receivedEl.offsetWidth;
        receivedEl.classList.add('copied');
      } catch {}
    });

    function connect() {
      const es = new EventSource('/stream');
      es.onopen = () => {
        statusEl.classList.add('live');
        statusEl.innerHTML = '<span class="dot"></span>connected';
      };
      es.onmessage = (ev) => {
        try {
          const data = JSON.parse(ev.data);
          receivedEl.textContent = data.text ?? '';
        } catch {
          receivedEl.textContent = ev.data;
        }
      };
      es.onerror = () => {
        statusEl.classList.remove('live');
        statusEl.innerHTML = '<span class="dot"></span>reconnecting';
        es.close();
        setTimeout(connect, 3000);
      };
    }
    connect();
  </script>
</body>
</html>
